spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pod
    username: pod
    password: pod
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.pod: DEBUG
    org.hibernate.SQL: DEBUG