name: CI — Backend + Frontend

on:
  push:
    branches: [main, develop, 'feature/*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  # ── Backend — Maven (test + integration) ──────────────────────────────────
  backend-test:
    name: Backend — Test + Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pod_user
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: pod_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Run backend unit tests
        working-directory: backend
        run: mvn -B test

      - name: Run backend integration tests (Testcontainers)
        working-directory: backend
        run: mvn -B verify -DskipUnitTests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/pod_test
          SPRING_DATASOURCE_USERNAME: pod_user
          SPRING_DATASOURCE_PASSWORD: secret

      - name: Publish coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend-unit
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  # ── Frontend — npm (install, lint, test, build) ───────────────────────────
  frontend-test:
    name: Frontend — Test + Lint + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Run unit + integration tests (Vitest)
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/coverage-final.json
          flags: frontend-unit
          fail_ci_if_error: false

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Run E2E tests (Playwright)
        working-directory: frontend/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:e2e
        env:
          FRONTEND_URL: 'http://localhost:4173'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── PR Comment — combined status ──────────────────────────────────────────
  pr-status:
    name: PR Status Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'pull_request'
    steps:
      - name: PR Checks Passed
        run: |
          echo "✅ All CI checks passed"
          echo "Backend: ${{ needs.backend-test.result }}"
          echo "Frontend: ${{ needs.frontend-test.result }}"
